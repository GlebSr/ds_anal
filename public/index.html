<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DS Analog — Голосовой чат</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <h1>DS Analog</h1>
      <p class="login-subtitle">Голосовой чат с демонстрацией экрана</p>
      <form id="login-form">
        <input
          type="text"
          id="nickname-input"
          placeholder="Введи никнейм..."
          maxlength="24"
          autocomplete="off"
          required
        />
        <button type="submit" id="join-btn">Войти</button>
      </form>
    </div>
  </div>

  <!-- Room screen -->
  <div id="room-screen" class="room-screen hidden">
    <!-- Sidebar: users list -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Комната</h2>
        <span id="user-count" class="user-count">0</span>
      </div>
      <ul id="users-list" class="users-list"></ul>
      <div class="sidebar-footer">
        <span id="my-nickname" class="my-nickname"></span>
      </div>
    </aside>

    <!-- Main area -->
    <main class="main-area">
      <!-- Screen share display -->
      <div id="screen-area" class="screen-area">
        <div id="screen-placeholder" class="screen-placeholder">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <path d="M8 21h8M12 17v4" />
          </svg>
          <p>Никто не транслирует экран</p>
        </div>
        <video id="screen-video" class="screen-video hidden" autoplay playsinline></video>
        <div id="screen-label" class="screen-label hidden">
          <span id="screen-sharer-name"></span> показывает экран
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="btn-mic" class="control-btn" title="Микрофон">
          <svg class="icon-mic-on" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="1" width="6" height="12" rx="3" />
            <path d="M5 10a7 7 0 0 0 14 0" />
            <path d="M12 17v4M8 21h8" />
          </svg>
          <svg class="icon-mic-off hidden" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="1" width="6" height="12" rx="3" />
            <path d="M5 10a7 7 0 0 0 14 0" />
            <path d="M12 17v4M8 21h8" />
            <line x1="1" y1="1" x2="23" y2="23" stroke="#f04747" stroke-width="2.5" />
          </svg>
        </button>

        <button id="btn-screen" class="control-btn" title="Демонстрация экрана">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <path d="M8 21h8M12 17v4" />
          </svg>
        </button>

        <button id="btn-leave" class="control-btn control-btn--danger" title="Выйти">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </main>
  </div>

  <!-- Hidden audio container for remote peers -->
  <div id="audio-container" style="display:none;"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="webrtc.js"></script>
  <script src="app.js"></script>
</body>
</html>
